name: PR Airlock

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
  issues:
    types: [opened, edited, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  airlock:
    runs-on: ubuntu-latest
    steps:
      # This repository dogfoods the local action with `uses: ./`, so the base
      # branch must be present in the workspace. This intentionally checks out
      # the trusted default branch, never contributor PR code. Consumers should
      # use `uses: owner/pr-airlock@sha` and do not need checkout at all.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
      - uses: ./
        with:
          config: .github/pr-airlock.yml
